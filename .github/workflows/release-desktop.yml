name: Release Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify release download metadata
        run: bun test packages/shared/src/desktop-release.test.ts packages/app-shell/src/components/Website.test.tsx

      - name: Compute next release version
        id: version
        run: |
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done < <(bun run scripts/release/next-version.ts)

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_glob: apps/desktop/artifacts/stable-macos-arm64-*
            artifact_name: desktop-release-macos-arm64
            label: macOS arm64
            os: macos-latest
          - artifact_glob: apps/desktop/artifacts/stable-linux-x64-*
            artifact_name: desktop-release-linux-x64
            label: Linux x64
            os: ubuntu-latest
    name: Build ${{ matrix.label }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build renderer
        run: bun run build:renderer

      - name: Build desktop release
        env:
          REKNA_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/latest/download
          REKNA_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: apps/desktop
        run: ./node_modules/.bin/electrobun build --env=stable

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-artifacts
          pattern: desktop-release-*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_TITLE: Rekna v${{ needs.prepare.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" \
              release-artifacts/* \
              --generate-notes \
              --latest \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE"
          fi
